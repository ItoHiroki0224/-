<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>【大恐竜展】恐竜性格診断</title>
    <script>
      (function() {
        var path = window.location.pathname;
        // If the path doesn't end with a slash and doesn't look like a file (no dot in the last segment),
        // redirect to the version with a trailing slash to ensure relative paths work correctly.
        if (!path.endsWith('/') && !path.split('/').pop().includes('.')) {
          window.location.replace(path + '/' + window.location.search + window.location.hash);
          return;
        }
        var base = path.substring(0, path.lastIndexOf('/') + 1);
        if (base && base !== '/') {
          var baseTag = document.createElement('base');
          baseTag.href = window.location.origin + base;
          document.head.appendChild(baseTag);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="src/main.tsx"></script>
  </body>
</html>
